<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FI Digital</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0E300E,#333333);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.container{
animation:fade 2s ease;
}

h1{
font-size:70px;
letter-spacing:3px;
color:#A4863D;
text-shadow:0 0 20px rgba(164,134,61,0.8);
}

p{
margin-top:20px;
font-size:20px;
opacity:0.8;
}

button{
margin-top:40px;
padding:15px 40px;
border:none;
border-radius:30px;
background:#A4863D;
color:white;
font-size:18px;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 15px rgba(164,134,61,0.7);
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(164,134,61,1);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>FI Digital</h1>

<p>Premium digital marketing agency helping brands grow with social media, ads and content.</p>

<button>Book a Call</button>

</div>

</body>
</html>
